<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>MD Reader</title>

  <!-- Highlight.js theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css?v=5">

  <!-- Highlight.js -->
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>

  <!-- Marked.js + highlight extension -->
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-highlight/lib/index.umd.js"></script>
</head>
<body>

<header class="tts-idle">
  <div class="group">
    <button id="pasteBtn">Paste</button>
    <button id="loadBtn">Load...</button>
    <button id="savedBtn">Saved</button>
  </div>

  <div class="group">
    <button id="speakBtn">Play</button>
    <button id="pauseBtn">Pause</button>
    <button id="resumeBtn">Resume</button>
    <button id="stopBtn">Stop</button>
    <button id="skipBackBtn">&laquo; Back</button>
    <button id="skipFwdBtn">Fwd &raquo;</button>
  </div>

  <div class="group">
    <label for="voiceSelect">Voice</label>
    <select id="voiceSelect"></select>
  </div>

  <div class="group">
    <button id="editBtn">Edit</button>
    <button id="downloadBtn">Download</button>
  </div>

  <div class="group">
    <label for="rateInput">Rate</label>
    <input id="rateInput" type="range" min="0.5" max="2" step="0.1" value="1">
    <span id="rateValue" class="small">1.0</span>
  </div>
</header>

<!-- Progress bar -->
<div id="progressBar"><div id="progressFill"></div></div>

<div id="appLayout">
  <!-- Playlist sidebar (hidden by default) -->
  <aside id="playlistPanel" class="hidden">
    <div class="playlist-header">
      <span class="playlist-title">Library</span>
      <button id="playlistCloseBtn" class="playlist-close">&times;</button>
    </div>
    <div class="panel-tabs">
      <button id="tabPlaylist" class="tab active">Playlist</button>
      <button id="tabSaved" class="tab">Saved</button>
    </div>
    <div id="playlistList"></div>
    <div id="savedList" class="hidden"></div>
  </aside>

  <main>
    <section class="panel">
      <div class="panel-title" id="editorTitle">Rendered Preview</div>
      <div id="preview"></div>
    </section>
    <textarea id="editor" hidden></textarea>
  </main>
</div>

<div id="status" role="status" aria-live="polite">Ready.</div>

<dialog id="bookDialog">
  <form method="dialog" class="book-dialog-form">
    <div class="book-dialog-title">Choose a Book</div>
    <div id="bookDialogList"></div>
    <menu class="book-dialog-actions">
      <button value="cancel">Cancel</button>
    </menu>
  </form>
</dialog>

<!-- App scripts (order matters) -->
<script src="js/ui.js?v=5"></script>
<script src="js/markdown.js?v=5"></script>
<script src="js/tts.js?v=5"></script>
<script src="js/files.js?v=5"></script>
<script src="js/app.js?v=5"></script>

</body>
</html>
